name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: validate transparency registry
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run stdlib validation
        run: python tools/validate_registry.py

      - name: Audit bootstrap prompt entry
        run: python tools/audit_prompt.py registry/vendors/anthropic/claude-opus-4.7-2026-04-16.json

      - name: Score transparency practices
        run: python tools/score_transparency.py
